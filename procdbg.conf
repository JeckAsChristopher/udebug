# ════════════════════════════════════════════════════════════════
#  PROCDBG Configuration File  —  procdbg.conf
#  Copy to ~/.config/procdbg/procdbg.conf  OR  /etc/procdbg/procdbg.conf
#  Or keep alongside the procdbg binary.
#
#  Search order:
#    1. ./procdbg.conf           (current directory / alongside binary)
#    2. ~/.config/procdbg/procdbg.conf
#    3. /etc/procdbg/procdbg.conf
#    4. --config <path>         (explicit override via CLI flag)
# ════════════════════════════════════════════════════════════════

# ── Output ───────────────────────────────────────────────────────
# Enable ANSI color codes in terminal output.
# Set to false if piping output or using a terminal without color support.
color_output = true

# Show verbose debug messages from procdbg itself.
verbose = false

# Write output to a file instead of stdout.
# Leave empty to print to stdout.
# output_file = /tmp/procdbg_output.txt
output_file =

# ── What to display ──────────────────────────────────────────────

# Dump .bss (uninitialized / zero-initialized data) sections.
# Shows both the section metadata and a live hex dump if attached.
dump_bss = true

# Read and display CPU registers.
# Requires ptrace (Linux), task_for_pid (macOS), or DebugActiveProcess (Windows).
# Full access usually requires sudo / admin.
dump_registers = true

# Display the full memory map of the process.
# On Linux: reads /proc/<pid>/maps (no root needed for own processes).
# On macOS: uses mach_vm_region_recurse (needs task port).
# On Windows: uses VirtualQueryEx (needs PROCESS_QUERY_INFORMATION).
dump_maps = true

# Dump a hex view of the stack (starting at RSP/SP).
# Disabled by default; enable with --dump-stack flag or here.
dump_stack = false

# Dump a hex view of heap regions.
# Identifies [heap] regions in the memory map and dumps the first page.
# Disabled by default; enable with --dump-heap flag or here.
dump_heap = false

# ── Hex dump settings ────────────────────────────────────────────

# Number of hex rows to show for stack dumps.
stack_depth = 16

# Number of bytes per row in hex output.
hex_width = 16

# ── Comprehensive mode (--c) ─────────────────────────────────────

# Enable comprehensive mode by default (same as passing --c on CLI).
# Recommended to leave false and use --c when needed.
comprehensive = false

# Maximum number of ASCII strings to extract from memory sections.
# Set to 0 to disable string extraction entirely.
max_strings = 80

# Minimum run of printable characters to qualify as a string.
min_string_len = 5

# ════════════════════════════════════════════════════════════════
#  PRIVILEGE NOTES
#  ────────────────
#  Linux:
#    Without sudo:  Can read /proc/<pid>/maps, parse ELF headers.
#                   Cannot read /proc/<pid>/mem for other users.
#    With    sudo:  Full ptrace + /proc/mem access. All features.
#
#  macOS:
#    Without sudo:  Can attach to processes you own if SIP allows it.
#                   Code-signed binaries with get-task-allow entitlement
#                   can be attached without sudo.
#    With    sudo:  task_for_pid() works for any process.
#    Note: System Integrity Protection (SIP) blocks some targets
#          even with sudo. Disable SIP in Recovery Mode if needed.
#
#  Windows:
#    Without admin: Can open processes with PROCESS_VM_READ for same user.
#    With    admin: Full PROCESS_ALL_ACCESS + DebugActiveProcess for any PID.
# ════════════════════════════════════════════════════════════════
